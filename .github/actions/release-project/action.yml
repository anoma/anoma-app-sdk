name: release-project
description: Upload the project artifact to the GitHub release
on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      bundle_filename:
        required: true
        type: string
      working_dir:
        required: true
        type: string

runs:
  using: composite
  steps:
    - name: Install npm dependencies
      uses: ./.github/actions/prepare-pnpm

    - name: Build Artifact
      working-directory: ${{ inputs.working_dir }}
      run: pnpm build
      shell: bash

    - name: Package
      working-directory: ${{ inputs.working_dir }}
      run: pnpm pack:ci
      shell: bash

    - name: Upload artifact
      working-directory: ${{ inputs.working_dir }}/package
      run: |
        gh release upload ${{ inputs.tag }} ${{ inputs.bundle_filename }}
      shell: bash
